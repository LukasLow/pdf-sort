<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>PDF Archivierung</title>
  <style>
    body {margin:0;display:flex;height:100vh;font-family:sans-serif;background:#f5f5f7;}
    .preview-side{flex:1;background:#555;}
    .preview-side iframe{width:100%;height:100%;border:none;}
    .form-side{width:460px;background:white;padding:24px;overflow:auto;box-sizing:border-box;}
    input,select,button{width:100%;padding:12px;margin-bottom:12px;box-sizing:border-box;font-size:16px;}
    .date-group{display:flex;gap:8px;}
    .meta-box{background:#f2f2f2;padding:12px;border-radius:8px;margin-bottom:16px;font-size:15px;line-height:1.7;}
    .preview-box{background:#eee;padding:12px;border-radius:8px;margin-top:12px;margin-bottom:12px;word-break:break-all;}
    .compress-row{display:flex;align-items:center;gap:10px;}
    button{color:white;border:none;padding:12px;border-radius:8px;font-size:14px;cursor:pointer;font-weight:600;flex:1;}
    .btn-main{background:#0071e3;flex:2;}.btn-main:hover{background:#0077ed;}
    .btn-trash{background:#ff453a;}.btn-trash:hover{background:#ff5247;}
    .btn-undo{background:#86868b;}.btn-undo:hover{background:#98989d;}
    .btn-add{background:#34c759;padding:10px;font-size:13px;}.btn-add:hover{background:#30b351;}
    button:disabled{background:#aeaeaf;cursor:not-allowed;}
    #status{margin-top:10px;font-size:14px;color:#0071e3;text-align:center;font-weight:500;min-height:20px;}
  </style>
</head>
<body>
  <div class="preview-side">
    <iframe id="pdf-viewer"></iframe>
  </div>
  <div class="form-side">
    <h1>📄 PDF Archivierung</h1>
    <div id="build-info" style="font-size:0.8rem; color:#666; margin-bottom:0.5rem;">Build: loading...</div>
    <div class="meta-box">
      <div><strong>Dateigröße:</strong> <span id="file-size">-</span></div>
      <div><strong>PPI:</strong> <span id="ppi">-</span></div>
    </div>
    <label>Datum</label>
    <div class="date-group">
      <input id="date-year" placeholder="YYYY">
      <input id="date-month" placeholder="MM">
      <input id="date-day" placeholder="DD">
    </div>
    <label>Korrespondent</label>
    <select id="sel-correspondent"></select>
    <label>Info</label>
    <select id="sel-info"></select>
    <label>Extra</label>
    <input id="extra-text">
    <label class="compress-row">
      <input type="checkbox" id="compress"> PDF komprimieren
    </label>
    <div class="preview-box"><div id="filename-preview"></div></div>
    <button onclick="processFile()">Archivieren</button>
    <button id="delete-btn" style="font-size:0.7rem; margin-left:0.5rem;" onclick="deleteFile()">Löschen</button>
  </div>
  <script src="/static/app.js"></script>
</body>
</html>
