<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>PDF Archivierung</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="preview-side">
<iframe id="pdf-viewer"></iframe>
</div>

<div class="form-side">

<h1>📄 PDF Archivierung</h1>

    <div id="build-info" style="font-size:0.8rem; color:#666; margin-bottom:0.5rem;">Build: loading...</div>

<div class="meta-box">
<div><strong>Dateigröße:</strong> <span id="file-size">-</span></div>
<div><strong>PPI:</strong> <span id="ppi">-</span></div>
</div>

<label>Datum</label>

<div class="date-group">
<input id="date-year" placeholder="YYYY">
<input id="date-month" placeholder="MM">
<input id="date-day" placeholder="DD">
</div>

<label>Korrespondent</label>
<select id="sel-correspondent"></select>

<label>Info</label>
<select id="sel-info"></select>

<label>Extra</label>
<input id="extra-text">

<label class="compress-row">
<input type="checkbox" id="compress">
PDF komprimieren
</label>

<div class="preview-box">
<div id="filename-preview"></div>
</div>

<button onclick="processFile()">Archivieren</button>
<button id="delete-btn" style="font-size:0.7rem; margin-left:0.5rem;" onclick="deleteFile()">Löschen</button>

</div>

<script src="/static/app.js"></script>
</body>
</html>
